# Publica SOMENTE os Guias do Usuario no GitHub Pages.
#
# Pre-requisitos:
#   1. Repositorio PUBLICO no GitHub: romaneio-guias (ou outro nome)
#   2. Este workflow no repo PRIVADO romaneio-documentation, OU no proprio repo publico
#   3. Secret (se deploy cross-repo): PUBLIC_DOCS_TOKEN = PAT com repo no destino
#
# Modelo A (recomendado): repo publico romaneio-guias contem apenas:
#   mkdocs.public.yml, docs-public/, scripts/, .github/workflows/pages.yml (copiar build deste arquivo)
#
# Modelo B: workflow abaixo com push para outro repo via peaceiris/actions-gh-pages

name: Build public guides

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/guias-usuario/**'
      - 'docs-public/**'
      - 'mkdocs.public.yml'
      - 'scripts/sync-public-docs.ps1'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync guias to docs-public
        shell: pwsh
        run: ./scripts/sync-public-docs.ps1

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material

      - name: Build public site
        run: mkdocs build -f mkdocs.public.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-public:
    needs: build-public
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
